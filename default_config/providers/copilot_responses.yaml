name: copilot_responses
display_name: "GitHub Copilot Responses API"
upstream_url: "https://api.enterprise.githubcopilot.com"
url_patterns:
  - "*githubcopilot.com/v1/responses"
  - "*githubcopilot.com/responses"
auth_headers:
  - "authorization"
  - "api-key"
  - "openai-organization"
session_id_headers:
  - "x-client-session-id"
  - "x-request-id"
  - "x-session-id"
  - "openai-conversation-id"
request_text_paths:
  - "$.input"
  - "$.input[*].content"
  - "$.input[*].content[*].text"
  - "$.input[*].output"
  - "$.input[*].arguments"
  - "$.instructions"
response_text_paths:
  - "$.output[*].content[*].text"
  - "$.output[*].arguments"
sse_events:
  response_text_delta:
    type_match: "response.output_text.delta"
    text_path: "delta"
  response_function_delta:
    type_match: "response.function_call_arguments.delta"
    text_path: "delta"
